---
name: linux

on:
  - push

jobs:
  build:
    name: Build, perltidy, coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: 'latest'
      - run: perl -V
      - run: cpanm -nq Dist::Zilla
      - name: Install author dependencies
        run: dzil authordeps --missing | cpanm -nq
      - name: Check perltidy formatting
        run: |
          cpanm -nq Test::PerlTidy
          perl -MTest::PerlTidy -e 'Test::PerlTidy::run_tests(perltidyrc => "perltidyrc")'
      - name: Build distribution
        run: dzil build --in build-dir
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-dir
          path: build-dir
      - name: Coverage
        continue-on-error: true
        working-directory: build-dir
        env:
          GITHUB_ACTIONS: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: |
          cpanm -nq --installdeps .
          cpanm -nq Devel::Cover Devel::Cover::Report::Coveralls
          perl Makefile.PL
          cover -test -report Coveralls

  test:
    name: Perl ${{ matrix.perl }} on ubuntu
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        perl: ["5.12", "5.20", "5.30", "latest"]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-dir
          path: build-dir
      - name: Set up perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - run: perl -V
      - name: Install dependencies and run tests
        working-directory: build-dir
        run: |
          cpanm -nq --installdeps .
          perl Makefile.PL
          make
          make test
