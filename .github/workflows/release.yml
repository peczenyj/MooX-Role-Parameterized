name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, CPAN and GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: 'latest'

      - name: Derive version from tag
        run: echo "V=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Install Dist::Zilla and dependencies
        run: |
          cpanm -nq Dist::Zilla CPAN::Uploader
          dzil authordeps --missing | cpanm -nq
          dzil listdeps --develop --missing | cpanm -nq

      - name: Gate - tests
        run: dzil test --all

      - name: Build distribution
        run: dzil build

      - name: Warn if CPAN upload will be skipped
        if: env.PAUSE_USER == ''
        env:
          PAUSE_USER: ${{ secrets.PAUSE_USER }}
        run: echo "::warning::PAUSE_USER secret not set - CPAN upload skipped"

      - name: Upload to CPAN
        if: env.PAUSE_USER != ''
        env:
          PAUSE_USER: ${{ secrets.PAUSE_USER }}
          PAUSE_PASSWORD: ${{ secrets.PAUSE_PASSWORD }}
        run: |
          cpan-upload -u "$PAUSE_USER" -p "$PAUSE_PASSWORD" MooX-Role-Parameterized-*.tar.gz

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: MooX-Role-Parameterized-*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
